<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trivia Trek — Editor Domande</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="img/favicon.png">
  <link rel="icon" type="image/svg+xml" href="img/favicon.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- Main Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ═══════════════════════════════════════════════
       FIXED HEADER
  ═══════════════════════════════════════════════ -->
  <header id="main-header">
    <img src="img/logo.svg" class="header-logo" alt="Trivia Trek">
  </header>

  <!-- ═══════════════════════════════════════════════
       LOCK SCREEN (sicurezza)
  ═══════════════════════════════════════════════ -->
  <div id="editor-lock-screen">
    <div class="lock-box">
      <div class="lock-header">
        <i class="fa-solid fa-shield-halved"></i>
        &nbsp; SISTEMA DI SICUREZZA FLOTTA STELLARE
      </div>
      <div class="lock-body">
        <div class="lock-icon">
          <i class="fa-solid fa-lock"></i>
        </div>
        <div class="lock-title">
          AUTORIZZAZIONE<br>DI COMANDO<br>RICHIESTA
        </div>
        <input
          type="password"
          id="lock-password"
          class="lock-input"
          placeholder="••••"
          maxlength="10"
          autocomplete="off"
        />
        <button id="lock-btn" class="lock-btn">
          <i class="fa-solid fa-satellite-dish"></i>
          &nbsp; AUTHORIZE
        </button>
        <div id="lock-denied-msg" class="lock-denied" style="visibility:hidden">
          ⚠ ACCESSO NEGATO ⚠
        </div>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════
       EDITOR APP (hidden until authenticated)
  ═══════════════════════════════════════════════ -->
  <div id="editor-app">

    <!-- Top bar -->
    <div class="editor-topbar">
      <h2><i class="fa-solid fa-database"></i> &nbsp;EDITOR DOMANDE</h2>
      <label class="ed-btn" for="load-json-input" style="cursor:pointer">
        <i class="fa-solid fa-folder-open"></i> &nbsp;CARICA JSON
      </label>
      <input type="file" id="load-json-input" accept=".json" style="display:none">
    </div>

    <!-- Category tabs -->
    <div id="cat-tabs" class="cat-tabs"></div>

    <!-- Questions editor area -->
    <div id="questions-editor" class="questions-editor"></div>

    <!-- Export button -->
    <div style="text-align:center;margin-top:32px">
      <button id="btn-export" class="ed-btn export">
        <i class="fa-solid fa-download"></i> &nbsp;ESPORTA DATI (quiz.json)
      </button>
    </div>

  </div><!-- /editor-app -->

  <!-- Audio elements (reused from game) -->
  <audio id="sfx-ok"    src="sfx/ok.mp3"    preload="auto"></audio>
  <audio id="sfx-wrong" src="sfx/wrong.mp3"  preload="auto"></audio>

  <script src="editor.js"></script>
</body>
</html>
