<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trivia Trek</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="img/favicon.png">
  <link rel="icon" type="image/svg+xml" href="img/favicon.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- Main Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ═══════════════════════════════════════════════
       FIXED HEADER
  ═══════════════════════════════════════════════ -->
  <header id="main-header">
    <img src="img/logo.svg" class="header-logo" alt="Trivia Trek">
  </header>

  <!-- ═══════════════════════════════════════════════
       SCREEN 1 — SPLASH
  ═══════════════════════════════════════════════ -->
  <div id="screen-splash" class="screen">

    <!-- Top LCARS decorative strip -->
    <div class="lcars-top-strip">
      <div class="lcars-top-elbow"></div>
      <div class="lcars-top-segs">
        <span class="ts ts-orange">58712</span>
        <span class="ts ts-orange">33574</span>
        <span class="ts ts-orange">95224</span>
        <span class="ts ts-orange">58233</span>
        <span class="ts ts-teal">6674</span>
        <span class="ts ts-orange-sm">55279</span>
      </div>
    </div>

    <div class="splash-body">

      <!-- Left LCARS sidebar (decorative) -->
      <div class="lcars-sidebar-left">
        <div class="lseg lseg-black">288-6531</div>
        <div class="lseg lseg-teal">258-6433</div>
        <div class="lseg lseg-orange" style="height:95px">553-9282</div>
        <div class="lseg lseg-lilac">123-5687</div>
        <div class="lseg lseg-orange2" style="height:32px">553-9282</div>
        <div class="lseg lseg-black2">101-1102</div>
        <div class="lseg lseg-teal2">258-6433</div>
        <div class="lseg lseg-lilac2">568-8389</div>
      </div>

      <!-- Center: big logo + click hint -->
      <div class="splash-center" id="splash-clickable">
        <img src="img/logo.svg" class="splash-logo" alt="Trivia Trek">
        <p class="splash-hint">● CLICCA OVUNQUE PER INIZIARE ●</p>
      </div>

    </div><!-- /splash-body -->

    <!-- Bottom LCARS strip -->
    <div class="lcars-bottom-strip">
      <span class="bs bs-black">22477545</span>
      <span class="bs bs-black">2385745</span>
      <span class="bs bs-black">122375</span>
      <span class="bs bs-black">15573-5</span>
      <span class="bs bs-teal">333712</span>
      <span class="bs bs-orange">57312</span>
    </div>

  </div><!-- /screen-splash -->

  <!-- ═══════════════════════════════════════════════
       SCREEN 2 — GAME BOARD
  ═══════════════════════════════════════════════ -->
  <div id="screen-game" class="screen hidden">

    <!-- Turn banner (desktop) -->
    <div id="turn-banner" class="turn-banner"></div>

    <div class="game-layout">
      <!-- Players sidebar (desktop) -->
      <aside id="players-sidebar" class="players-sidebar"></aside>
      <!-- 3x3 Categories grid -->
      <main id="categories-grid" class="categories-grid"></main>
    </div>

    <!-- Players bar (mobile — fixed bottom) -->
    <div id="players-mobile-bar" class="players-mobile-bar"></div>

  </div><!-- /screen-game -->

  <!-- ═══════════════════════════════════════════════
       SCREEN 3 — GAME OVER
  ═══════════════════════════════════════════════ -->
  <div id="screen-gameover" class="screen hidden">
    <div class="gameover-container">
      <h2 class="go-title"><i class="fa-solid fa-trophy"></i> MISSIONE COMPLETATA</h2>
      <p class="go-stardate">DATA STELLARE: <span id="go-stardate-val"></span></p>
      <div id="go-winner-box" class="go-winner-box">
        <div class="go-winner-label">★ WINNER ★</div>
        <div id="go-winner-name" class="go-winner-name"></div>
        <div id="go-winner-score" class="go-winner-score"></div>
      </div>
      <div id="go-ranking-list" class="go-ranking-list"></div>
      <!-- button class="go-play-again" onclick="location.reload()">
        <i class="fa-solid fa-rotate-right"></i> NUOVA PARTITA
    </button -->
    </div>
  </div><!-- /screen-gameover -->

  <!-- ═══════════════════════════════════════════════
       POPUP — PLAYER SETUP
  ═══════════════════════════════════════════════ -->
  <div id="popup-players" class="popup-overlay hidden">
    <div class="lcars-popup">
      <div class="popup-header teal">
        <span><i class="fa-solid fa-person-dots-from-line"></i> &nbsp;SELEZIONE EQUIPAGGIO</span>
      </div>
      <div class="popup-body">

        <label class="lcars-label">NUMERO PARTECIPANTI</label>
        <div class="count-buttons">
          <button class="count-btn active" data-count="2">2</button>
          <button class="count-btn" data-count="3">3</button>
          <button class="count-btn" data-count="4">4</button>
        </div>

        <label class="lcars-label">NOMINATIVI</label>
        <div id="name-inputs-container" class="name-inputs-container"></div>

        <button id="btn-engage" class="engage-btn">
          <i class="fa-solid fa-rocket"></i> &nbsp;ENGAGE
        </button>

      </div>
    </div>
  </div><!-- /popup-players -->

  <!-- ═══════════════════════════════════════════════
       POPUP — QUESTION
  ═══════════════════════════════════════════════ -->
  <div id="popup-question" class="popup-overlay hidden">
    <div class="lcars-popup question-popup">
      <div class="popup-header orange" id="q-popup-header">
        <span id="q-category-label">MATERIA</span>
        <span id="q-points-label" style="font-family:var(--font-score);font-size:1.3rem">000</span>
      </div>
      <div class="popup-body">
        <div id="q-turn-indicator" class="q-turn-indicator"></div>
        <div id="q-result-msg" class="q-result-msg hidden" style="display:none"></div>
        <div id="q-points-awarded" class="q-points-awarded" style="display:none"></div>
        <img id="q-image" class="q-image" src="" alt="" style="display:none">
        <p id="q-text" class="q-text"></p>
        <div class="q-answers">
          <button class="q-answer-btn" data-ans="A">
            <span class="ans-label">A</span>
            <span class="ans-text" id="q-ans-a"></span>
          </button>
          <button class="q-answer-btn" data-ans="B">
            <span class="ans-label">B</span>
            <span class="ans-text" id="q-ans-b"></span>
          </button>
          <button class="q-answer-btn" data-ans="C">
            <span class="ans-label">C</span>
            <span class="ans-text" id="q-ans-c"></span>
          </button>
        </div>
      </div>
    </div>
  </div><!-- /popup-question -->

  <!-- Audio elements -->
  <audio id="sfx-intro"   src="sfx/intro.mp3"  preload="auto"></audio>
  <audio id="sfx-theme"   src="sfx/theme.mp3"  preload="auto" loop></audio>
  <audio id="sfx-ok"      src="sfx/ok.mp3"     preload="auto"></audio>
  <audio id="sfx-wrong"   src="sfx/wrong.mp3"  preload="auto"></audio>
  <audio id="sfx-winner"  src="sfx/winner.mp3" preload="auto"></audio>
  <audio id="sfx-engage"  src="sfx/engage.mp3" preload="auto"></audio>

  <script src="script.js"></script>
</body>
</html>
